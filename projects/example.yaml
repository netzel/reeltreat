# Example reeltreat project manifest.
#
# Copy this file to projects/<your-project>.yaml and edit it, then run:
#   npm run login   -- <your-project>   # one-time: log in, session is saved
#   npm run capture -- <your-project>   # screenshots every shot below
#
# "myapp" and "example.com" are placeholders — swap in your own app.

# Display name, used in the demo video's title card.
name: myapp

# Base URL every shot's `path` is resolved against.
# Can be a deployed site or a local dev server, e.g. http://localhost:3000
baseUrl: https://myapp.example.com

# Browser viewport for both login and capture.
viewport:
  width: 1440
  height: 900

# Where the one-time manual login should start. Path or full URL.
# Optional — defaults to baseUrl if omitted.
loginUrl: /login

# Capture defaults applied to every shot below unless the shot sets its own.
# Resolution order for each field: per-shot value > this default > built-in.
# Built-ins: waitUntil=load, timeoutMs=30000, fullPage=false (waitFor/delayMs unset).
# Same fields and types as the per-shot settings documented under `shots`.
defaults:
  # Settle delay (ms) after load, so client-rendered pages finish fetching data
  # before the screenshot — avoids capturing loading skeletons. This is the most
  # common thing to set once here instead of on every shot.
  delayMs: 2000
  # Other fields you may set here (all optional):
  #   waitUntil: load        # or domcontentloaded / networkidle
  #   timeoutMs: 30000
  #   waitFor: "[data-testid='app-ready']"
  #   fullPage: false

# Brand tokens (all optional) used later by the render layer.
brand:
  logoPath: ./assets/logo.svg
  primaryColor: "#0B5FFF"
  accentColor: "#00C2A8"
  font: Inter

# The screens to capture, in order. `id` must be a slug
# (lowercase letters, numbers, hyphens) and unique within this file.
shots:
  - id: dashboard
    path: /dashboard
    caption: Your whole workspace at a glance
    # When navigation is considered done. Optional, one of:
    #   load            (default) wait for the load event
    #   domcontentloaded  wait only for the initial HTML/DOM
    #   networkidle     wait for the network to go quiet — AVOID: it never
    #                   settles on pages with live connections, and Playwright
    #                   discourages it.
    # Pages with long-lived connections (streaming audio/video, polling,
    # websockets) should use "domcontentloaded" plus a waitFor selector or a
    # delayMs settle, rather than waiting on the network.
    waitUntil: load
    # Wait for a specific element before screenshotting, so the shot isn't
    # captured mid-load. Optional CSS selector.
    waitFor: "[data-testid='dashboard-ready']"

  - id: settings
    path: /settings
    caption: Fine-tune everything in one place
    # Navigation/selector wait budget in milliseconds. Optional, default 30000.
    # A navigation timeout no longer fails the shot: if the page has rendered,
    # capture screenshots it anyway and reports a warning.
    timeoutMs: 30000
    # Example for a page that holds an open connection: don't wait on the
    # network; take the DOM and settle briefly before the shot.
    #   waitUntil: domcontentloaded
    #   delayMs: 500
    # Extra settle time (ms) after load — handy for entry animations.
    # Optional, non-negative.
    delayMs: 500
    # Capture the full scrollable page instead of just the viewport.
    fullPage: true

  # Manual image shot: supply a screenshot you took yourself, for a state the
  # browser can't reach on its own — anything needing real hardware input, live
  # audio, or a human in the loop (here, a live voice-transcription view being
  # driven by a real microphone). Provide `image` instead of `path`.
  # Browser-only settings (waitUntil, timeoutMs, waitFor, delayMs, fullPage) are
  # not allowed on an image shot. Keep the file under manual/<project>/ at the
  # repo root (that folder is gitignored, so your assets never ship).
  - id: live-transcription
    caption: Real-time transcription as you speak
    image: manual/myapp/live-transcription.png
